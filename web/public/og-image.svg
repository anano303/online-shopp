<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F14"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#D4D4D8"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#06B6D4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent line -->
  <line x1="300" y1="140" x2="900" y2="140" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- "1" -->
  <g filter="url(#shadow)">
    <path d="M390 165 L450 165 L450 175 L430 205 L430 165 Z" fill="url(#txt)" opacity="0.7"/>
    <rect x="430" y="165" width="20" height="300" rx="3" fill="url(#txt)"/>
    <rect x="370" y="445" width="100" height="20" rx="10" fill="url(#txt)"/>
  </g>

  <!-- Diamond separator -->
  <rect x="510" y="310" width="14" height="14" rx="2" fill="url(#accent)" transform="rotate(45, 517, 317)" opacity="0.85"/>

  <!-- "3" -->
  <g filter="url(#shadow)">
    <path d="M570 175 C570 175, 720 155, 770 175 C820 195, 815 240, 770 260 C755 267, 720 270, 705 266" fill="none" stroke="url(#txt)" stroke-width="20" stroke-linecap="round"/>
    <path d="M705 280 C720 276, 760 278, 785 295 C830 320, 820 370, 775 385 C750 395, 570 388, 570 385" fill="none" stroke="url(#txt)" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- Bottom accent line -->
  <line x1="300" y1="490" x2="900" y2="490" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>

  <!-- Brand text -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" letter-spacing="12" fill="#71717A">ცამეტი</text>
</svg>
